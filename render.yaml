# Render Blueprint — Strapi backend + Neon PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
#
# Before deploy: create a Neon project and paste DATABASE_URL into Render env vars.

services:
  - type: web
    name: nabeel-strapi
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      # Set in Render dashboard after Neon setup:
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
      # Origins only (no path): https://portalusercoder.github.io
      - key: FRONTEND_URL
        value: https://portalusercoder.github.io
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
