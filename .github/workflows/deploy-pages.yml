name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.event.repository.owner }}.github.io/${{ github.event.repository.name }}
          SECRET_STRAPI_URL: ${{ secrets.NEXT_PUBLIC_STRAPI_URL || vars.NEXT_PUBLIC_STRAPI_URL }}
        run: |
          if [ -n "$SECRET_STRAPI_URL" ]; then
            export NEXT_PUBLIC_STRAPI_URL="${SECRET_STRAPI_URL%/}"
          elif [ -f strapi.url ]; then
            export NEXT_PUBLIC_STRAPI_URL="$(tr -d '[:space:]' < strapi.url)"
          fi
          if [ -z "$NEXT_PUBLIC_STRAPI_URL" ]; then
            echo "::error::Set NEXT_PUBLIC_STRAPI_URL (GitHub secret) or commit frontend/strapi.url with your Render URL."
            exit 1
          fi
          case "$NEXT_PUBLIC_STRAPI_URL" in
            *localhost*|*127.0.0.1*)
              echo "::error::Strapi URL must be your Render URL, not localhost."
              exit 1
              ;;
          esac
          echo "Building with Strapi: $NEXT_PUBLIC_STRAPI_URL"
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
