name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Required so Environment secrets (github-pages) are visible during npm run build.
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify Strapi URL is configured
        env:
          STRAPI_URL: ${{ secrets.NEXT_PUBLIC_STRAPI_URL || vars.NEXT_PUBLIC_STRAPI_URL }}
        run: |
          if [ -z "$STRAPI_URL" ]; then
            echo "::error::NEXT_PUBLIC_STRAPI_URL is missing. Add it under Settings → Secrets and variables → Actions → Repository secrets (name must match exactly), or as a repository variable / github-pages environment secret."
            exit 1
          fi
          case "$STRAPI_URL" in
            *localhost*|*127.0.0.1*) echo "::error::NEXT_PUBLIC_STRAPI_URL must be your Render URL (e.g. https://nabeel-strapi.onrender.com), not localhost."; exit 1 ;;
          esac
          echo "Strapi URL is set for build."

      - name: Install & build
        working-directory: frontend
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.event.repository.owner }}.github.io/${{ github.event.repository.name }}
          NEXT_PUBLIC_STRAPI_URL: ${{ secrets.NEXT_PUBLIC_STRAPI_URL || vars.NEXT_PUBLIC_STRAPI_URL }}
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
